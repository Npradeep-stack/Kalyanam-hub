<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Planning | Kalyanam Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #D4AF37;
            --bg: #050505;
            --surface: #0F0F10;
            --card-inner: #161618;
            --text-main: #FFFFFF;
            --text-dim: #86868B;
            --border: rgba(255, 255, 255, 0.1);
            --premium: #6366f1; /* Indigo for Weekend/Christian/Secular windows */
            --shubh: #22c55e;   /* Green for Vedic Shubh */
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 25px; }

        /* --- NAV --- */
        nav {
            height: 70px; display: flex; align-items: center;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        .nav-inner { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; padding: 0 25px; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); text-decoration: none; font-weight: 700; }

        .header { padding: 140px 0 40px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 10px; color: #fff; }

        /* --- MARKET INSIGHTS --- */
        .market-insights { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .insight-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 16px; transition: 0.3s; }
        .insight-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .insight-value { font-size: 16px; font-weight: 600; }

        /* --- CONTROLS --- */
        .controls { 
            margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; 
            background: var(--surface); padding: 10px 20px; border-radius: 12px; width: fit-content; margin-inline: auto;
            border: 1px solid var(--border);
        }
        .select-wrapper { position: relative; display: flex; align-items: center; }
        .select-wrapper::after {
            content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: -5px; color: var(--gold); font-size: 12px; pointer-events: none;
        }
        select { background: transparent; color: #fff; border: none; cursor: pointer; font-size: 15px; outline: none; padding: 5px; appearance: none; -webkit-appearance: none; }
        select option { background-color: #161618; color: #fff; }

        /* --- CALENDAR --- */
        .calendar-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 20px; text-align: center; }
        .weekday { color: var(--gold); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .grid-body { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        
        .day {
            aspect-ratio: 1/1.1; background: var(--card-inner); border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; position: relative; cursor: pointer;
        }
        .day:hover { border-color: var(--gold); background: #1c1c1e; transform: translateY(-3px); }
        .day-num { font-size: 18px; color: #fff; }

        /* Labels */
        .type-label { font-size: 7px; font-weight: 800; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-msg { font-size: 7px; color: var(--danger); margin-top: 2px; font-weight: 700; }

        /* Scarcity Bar */
        .avail-bar { width: 35px; height: 3px; background: #222; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        .avail-fill { height: 100%; transition: 0.8s; }

        footer { padding: 40px; text-align: center; color: #444; font-size: 11px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner"><a href="homee.html" class="logo">KALYANAM HUB</a></div>
</nav>

<header class="header">
    <div class="container">
        <h1>Market Intelligence</h1>
        <p style="color: var(--text-dim)">Universal wedding planning & live venue negotiation data.</p>
    </div>
</header>

<div class="container">
    <div class="market-insights">
        <div class="insight-card">
            <span class="insight-label">Market Demand</span>
            <div class="insight-value" id="demandVal">Steady</div>
        </div>
        <div class="insight-card">
            <span class="insight-label">Booking Speed</span>
            <div class="insight-value" id="speedVal">Normal</div>
        </div>
        <div class="insight-card" id="statusCard">
            <span class="insight-label">Negotiation Power</span>
            <div class="insight-value" id="statusVal">Checking...</div>
        </div>
    </div>

    <div class="controls">
        <div class="select-wrapper"><select id="ySel"></select></div>
        <span style="opacity: 0.2; margin: 0 10px;">|</span>
        <div class="select-wrapper"><select id="mSel"></select></div>
    </div>

    <div class="calendar-card">
        <div class="grid-header">
            <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
            <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
        </div>
        <div class="grid-body" id="calGrid"></div>
    </div>
</div>

<footer>VERIFIED MARKET DATA | STRATEGIC EVENT LOGISTICS</footer>

<script>
    const ySel = document.getElementById("ySel");
    const mSel = document.getElementById("mSel");
    const grid = document.getElementById("calGrid");

    const muData = {
        2026: { 2: [5, 6, 8, 10, 12, 14, 19, 21], 5: [10, 11, 15, 20], 6: [21, 23, 25], 11: [21, 24, 25, 26] },
        2027: { 5: [9, 10, 23, 24], 11: [11, 12, 15, 17, 21] }
    };

    const seasonalLogic = {
        5:  { demand: "Critical", speed: "Instant", status: "Fixed Rates", color: "#ef4444", advice: "Book within 24hrs" },
        11: { demand: "Critical", speed: "Instant", status: "Fixed Rates", color: "#ef4444", advice: "Book within 24hrs" },
        2:  { demand: "High", speed: "Fast", status: "Limited Discounts", color: "#facc15", advice: "Ask for Add-ons" },
        8:  { demand: "Standard", speed: "Flexible", status: "High Leverage", color: "#22c55e", advice: "Demand 20% Off" },
        1:  { demand: "Standard", speed: "Flexible", status: "High Leverage", color: "#22c55e", advice: "Maximize Bargaining" },
        default: { demand: "Steady", speed: "Normal", status: "Open Negotiation", color: "#D4AF37", advice: "Compare & Bargain" }
    };

    [2026, 2027].forEach(y => ySel.add(new Option(y, y)));
    ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"].forEach((m, i) => mSel.add(new Option(m, i + 1)));

    function init() {
        grid.innerHTML = "";
        const y = parseInt(ySel.value), m = parseInt(mSel.value);
        const market = seasonalLogic[m] || seasonalLogic.default;

        // Update Intelligence Bar
        document.getElementById("demandVal").innerText = market.demand;
        document.getElementById("speedVal").innerText = market.speed;
        const statusVal = document.getElementById("statusVal");
        const statusCard = document.getElementById("statusCard");
        statusVal.style.color = market.color;
        statusCard.style.borderColor = market.color;
        statusVal.innerHTML = `${market.status} <div style="font-size: 9px; opacity: 0.6; margin-top:2px;">Expert: ${market.advice}</div>`;

        const start = new Date(y, m-1, 1).getDay(), total = new Date(y, m, 0).getDate();

        for(let i=0; i<start; i++) grid.appendChild(document.createElement("div"));

        for(let d=1; d<=total; d++) {
            const el = document.createElement("div");
            el.className = "day";
            const dateObj = new Date(y, m - 1, d);
            const isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
            const isVedic = muData[y]?.[m]?.includes(d);
            
            let label = "";
            let color = "transparent";
            let pressure = 0;

            if (isVedic) {
                label = "Vedic Shubh";
                color = "var(--shubh)";
                pressure = (m==5 || m==11) ? 95 : 75;
            } else if (isWeekend) {
                label = "Elite Window";
                color = "var(--premium)";
                pressure = (m==5 || m==11) ? 50 : 30;
            }

            el.innerHTML = `
                <span class="day-num">${d}</span>
                <span class="type-label" style="color: ${color}">${label}</span>
                ${pressure > 0 ? `
                    <div class="avail-bar"><div class="avail-fill" style="width: ${pressure}%; background: ${color}"></div></div>
                ` : ''}
            `;

            el.onclick = () => {
                localStorage.setItem("selectedDate", `${d}-${m}-${y}`);
                window.location.href = "venues.html";
            };

            grid.appendChild(el);
        }
    }

    ySel.onchange = mSel.onchange = init;
    init();
</script>
</body>
</html>
