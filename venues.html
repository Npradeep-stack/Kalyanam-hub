<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyanam Hub </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --accent: #FACC15; --danger: #ef4444; --success: #22c55e; --bg: #f8fafc; --border: #e2e8f0; --text-muted: #64748b; --peak: #f43f5e; --standard: #6366f1; --off: #10b981; }
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding-top: 165px; color: var(--brand); }
        .header-container { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .nav-main { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 800; font-size: 22px; text-decoration: none; color: var(--brand); letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { cursor: pointer; font-weight: 700; color: var(--text-muted); font-size: 14px; padding: 5px 0; position: relative; }
        .nav-item.active { color: var(--brand); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 10px; }
        .filter-bar { background: #fff; padding: 10px 20px 15px; display: flex; gap: 12px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .f-group { min-width: 140px; flex: 1; }
        .f-group label { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .f-trigger { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #fdfdfd; font-weight: 600; font-size: 14px; cursor: pointer; text-align: left; }
        @media (min-width: 1024px) { body { padding-top: 200px; } .filter-bar { display: grid; grid-template-columns: repeat(3, 1fr); max-width: 1200px; margin: 0 auto; padding: 15px 0 25px; overflow: visible; background: transparent; border: none; } }
        #cal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: flex-end; justify-content: center; }
        .cal-sheet { background: white; width: 100%; border-radius: 32px 32px 0 0; padding: 25px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .cal-sheet.open { transform: translateY(0); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-month-title { font-size: 18px; font-weight: 800; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day-name { font-size: 10px; font-weight: 800; color: var(--text-muted); text-align: center; }
        .cal-date { aspect-ratio: 1/1.2; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .cal-date.selected { background: var(--brand) !important; color: white !important; }
        .cal-date.disabled { opacity: 0.2; pointer-events: none; }
        .cal-num { font-size: 14px; font-weight: 700; }
        .cal-p-tag { font-size: 8px; font-weight: 800; margin-top: 2px; }
        @media (min-width: 768px) { #cal-overlay { align-items: center; padding: 20px; } .cal-sheet { max-width: 420px; border-radius: 32px; transform: scale(0.9); opacity: 0; } .cal-sheet.open { transform: scale(1); opacity: 1; } }
        .page { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .active-page { display: block; }
        #hall-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 28px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .season-badge { position: absolute; top: 15px; right: 15px; padding: 6px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; color: white; z-index: 10; }
        .card-img { width: 100%; height: 240px; object-fit: cover; }
        .card-body { padding: 25px; }
        .price-now { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 2000; align-items: flex-end; justify-content: center; }
        .modal-box { background: white; width: 100%; border-radius: 35px 35px 0 0; padding: 30px; max-height: 92vh; overflow-y: auto; }
        @media (min-width: 768px) { #modal-overlay { align-items: center; } .modal-box { border-radius: 35px; max-width: 700px; } }
        .lobby-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
        .lobby-card { border: 2px solid var(--border); border-radius: 16px; cursor: pointer; overflow: hidden; text-align: center; font-size: 11px; background: #fff; padding-bottom: 8px; }
        .lobby-card img { width: 100%; height: 70px; object-fit: cover; }
        .lobby-card.selected { border-color: var(--accent); background: #fffdf2; }
        .form-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 16px; outline: none; font-family: inherit; }
        .form-input:focus { border-color: var(--brand); }
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--brand); color: white; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .booking-ticket { background: white; border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: row; overflow: hidden; margin-bottom: 25px; min-height: 180px; }
        .ticket-visual { width: 200px; }
        .ticket-visual img { width: 100%; height: 100%; object-fit: cover; }
        .ticket-content { padding: 25px; flex: 1; position: relative; }
        @media (max-width: 600px) { .booking-ticket { flex-direction: column; height: auto; } .ticket-visual { width: 100%; height: 150px; } }
    </style>
</head>
<body>
    <div class="header-container">
        <nav class="nav-main">
            <a href="#" class="logo" onclick="switchPage('halls')">Kalyanam<span>Hub</span></a>
            <div class="nav-links">
                <span id="link-halls" class="nav-item active" onclick="switchPage('halls')">Venues</span>
                <span id="link-bookings" class="nav-item" onclick="switchPage('bookings')">Bookings</span>
            </div>
        </nav>
        <div class="filter-bar">
            <div class="f-group"><label>Location</label><select id="city-f" class="f-trigger" onchange="update()"><option value="Kakinada">Kakinada</option><option value="Rajahmundry">Rajahmundry</option><option value="Vijayawada">Vijayawada</option></select></div>
            <div class="f-group"><label>Date</label><div class="f-trigger" id="date-display" onclick="openCalendar()">Select Date</div></div>
            <div class="f-group"><label>Budget</label><select id="budget-f" class="f-trigger" onchange="update()"><option value="99999999">Any Budget</option><option value="200000">Upto 2L</option><option value="400000">Upto 4L</option></select></div>
        </div>
    </div>

    <div id="cal-overlay" onclick="closeCalendar()">
        <div class="cal-sheet" id="cal-sheet" onclick="event.stopPropagation()">
            <div class="cal-header">
                <i class="fa fa-chevron-left" onclick="changeMonth(-1)" style="cursor:pointer; padding:10px;"></i>
                <span class="cal-month-title" id="cal-month-year"></span>
                <i class="fa fa-chevron-right" onclick="changeMonth(1)" style="cursor:pointer; padding:10px;"></i>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <button class="btn-main" onclick="closeCalendar()" style="background:#f1f5f9; color:black; margin-top:20px;">Close</button>
        </div>
    </div>

    <div id="page-halls" class="page active-page"><div id="hall-grid"></div></div>
    <div id="page-bookings" class="page"><h1 style="font-weight:800; font-size: 32px; letter-spacing: -1px; margin-bottom: 30px;">My Bookings</h1><div id="booking-list"></div></div>
    <div id="modal-overlay" onclick="closeModal()"><div class="modal-box" id="modal-content" onclick="event.stopPropagation()"></div></div>

<script>
    const addons = [
        { id: 'a1', name: "Catering", price: 85000, img: "https://images.unsplash.com/photo-1555244162-803834f70033?w=300" },
        { id: 'a2', name: "Decoration", price: 50000, img: "https://images.unsplash.com/photo-1519741497674-611481863552?w=300" },
        { id: 'a3', name: "Photography", price: 40000, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300" },
        { id: 'a4', name: "Live DJ", price: 20000, img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300" },
        { id: 'a5', name: "Makeup", price: 15000, img: "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=300" },
        { id: 'a6', name: "Drone", price: 12000, img: "https://images.unsplash.com/photo-1507504031003-b417219a0fde?w=300" }
    ];

    const venues = [
        { id: 1, name: "Goutami Grand", base: 150000, loc: 'Kakinada', img: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=800", cap: "800 Guests", type: "AC Convention" },
        { id: 2, name: "Godavari Convention", base: 350000, loc: 'Rajahmundry', img: "https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800", cap: "1500 Guests", type: "Central AC" },
        { id: 3, name: "Novotel Grand", base: 550000, loc: 'Vijayawada', img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=800", cap: "2000 Guests", type: "Luxury Hall" }
    ];

    const PLATFORM_FEE = 1499;
    let myBookings = [], selectedAddons = new Set(), currentHall = null, activePrice = 0;
    let selectedDate = null, currentViewDate = new Date();

    window.onload = () => { update(); };

    function getSeason(m) {
        const month = m + 1;
        if(month >= 2 && month <= 5) return { mult: 1.25, label: "PEAK (+25%)", color: "var(--peak)" };
        if(month == 7 || month == 8) return { mult: 0.80, label: "OFF (-20%)", color: "var(--off)" };
        return { mult: 0.84, label: "STANDARD", color: "var(--brand)" }; 
    }

    function openCalendar() {
        document.getElementById('cal-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('cal-sheet').classList.add('open'), 10);
        renderCalendar();
    }
    function closeCalendar() {
        document.getElementById('cal-sheet').classList.remove('open');
        setTimeout(() => document.getElementById('cal-overlay').style.display = 'none', 300);
    }
    function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }

    function renderCalendar() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = "";
        const year = currentViewDate.getFullYear(), month = currentViewDate.getMonth();
        document.getElementById('cal-month-year').innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentViewDate);
        ["S", "M", "T", "W", "T", "F", "S"].forEach(d => { grid.innerHTML += `<div class="cal-day-name">${d}</div>`; });
        const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        
        const season = getSeason(month);
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isPast = new Date(dateStr) < new Date().setHours(0,0,0,0);
            grid.innerHTML += `
                <div class="cal-date ${isPast ? 'disabled' : ''} ${selectedDate === dateStr ? 'selected' : ''}" 
                     onclick="selectDate('${dateStr}')" style="color:${season.color}">
                    <span class="cal-num">${d}</span>
                    <span class="cal-p-tag">${isPast ? '-' : '₹'+Math.round((150000*season.mult)/1000)+'k'}</span>
                </div>`;
        }
    }

    function selectDate(date) {
        selectedDate = date; document.getElementById('date-display').innerText = date;
        closeCalendar(); update();
    }

    function update() {
        const city = document.getElementById('city-f').value;
        const budget = parseInt(document.getElementById('budget-f').value);
        const grid = document.getElementById('hall-grid'); grid.innerHTML = "";
        let season = { mult: 0.84, label: "STANDARD", color: "var(--brand)" };
        if(selectedDate) season = getSeason(new Date(selectedDate).getMonth());

        venues.filter(v => v.loc === city).forEach(v => {
            const p = Math.round(v.base * season.mult);
            const isB = myBookings.some(b => b.hallId === v.id && b.date === selectedDate && b.status === 'Confirmed');
            if (p <= budget) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="season-badge" style="background:${season.color}">${season.label}</div>
                        <img src="${v.img}" class="card-img">
                        <div class="card-body">
                            <div style="font-size:12px; font-weight:700; color:var(--text-muted);">${v.cap} • ${v.type}</div>
                            <h2 style="margin:5px 0; font-weight:800;">${v.name}</h2>
                            <div class="price-now">₹${p.toLocaleString()}</div>
                            <button class="btn-main" onclick="handleBook(${v.id}, ${p}, ${isB})">${isB ? 'Booked' : 'Book Now'}</button>
                        </div>
                    </div>`;
            }
        });
    }

    function handleBook(id, price, isB) {
        if(isB) return;
        if(!selectedDate) { openCalendar(); return; }
        currentHall = venues.find(v => v.id === id);
        activePrice = price; selectedAddons.clear(); renderModal();
    }

    function renderModal() {
        const currentName = document.getElementById('c-name') ? document.getElementById('c-name').value : "";
        const currentPhone = document.getElementById('c-phone') ? document.getElementById('c-phone').value : "";
        const currentEmail = document.getElementById('c-email') ? document.getElementById('c-email').value : "";

        const adv = Math.round(activePrice * 0.10);
        const bal = activePrice - adv; 
        
        let adH = "", adS = 0;
        addons.forEach(a => {
            if(selectedAddons.has(a.id)) adS += a.price;
            adH += `<div class="lobby-card ${selectedAddons.has(a.id) ? 'selected' : ''}" onclick="toggleAddon('${a.id}')"><img src="${a.img}"><div><b>${a.name}</b><br>₹${a.price.toLocaleString()}</div></div>`;
        });
        const total = adv + adS + PLATFORM_FEE;
        
        document.getElementById('modal-content').innerHTML = `
            <h2 style="margin:0;">Confirm Details</h2>
            <p style="color:var(--text-muted); margin-bottom:15px;">${currentHall.name} • ${selectedDate}</p>
            
            <input type="text" id="c-name" class="form-input" placeholder="Full Name">
            <input type="tel" id="c-phone" class="form-input" placeholder="Mobile Number">
            <input type="email" id="c-email" class="form-input" placeholder="Email Address">
            
            <p style="font-size:11px; font-weight:800; margin:15px 0 10px; color:var(--text-muted); text-transform:uppercase;">Customise Add-ons</p>
            <div class="lobby-grid">${adH}</div>
            
            <div style="background:#000; color:white; padding:25px; border-radius:25px; margin:20px 0;">
                <div style="display:flex; justify-content:space-between; opacity:0.7; font-size:14px;"><span>Advance (10%) + Addons</span><b>₹${(adv+adS).toLocaleString()}</b></div>
                <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:800; border-top:1px solid #333; padding-top:15px; margin-top:10px;"><span>Pay Now</span><span style="color:var(--accent);">₹${total.toLocaleString()}</span></div>
                <div style="margin-top:10px; padding-top:10px; border-top:1px dashed #444; font-size:12px; color:var(--accent); font-weight:700; display:flex; justify-content:space-between;">
                    <span>PAY AT HALL:</span><span>₹${bal.toLocaleString()}</span>
                </div>
            </div>
            <button class="btn-main" style="background:var(--accent); color:black;" onclick="confirmB(${total}, ${bal})">Secure Booking</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:10px; color:var(--text-muted);">Go Back</button>`;

        document.getElementById('c-name').value = currentName;
        document.getElementById('c-phone').value = currentPhone;
        document.getElementById('c-email').value = currentEmail;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function toggleAddon(id) { selectedAddons.has(id) ? selectedAddons.delete(id) : selectedAddons.add(id); renderModal(); }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function confirmB(total, bal) {
        const n = document.getElementById('c-name').value;
        const p = document.getElementById('c-phone').value;
        const e = document.getElementById('c-email').value;

        if(!n || !p || !e) return alert("Please enter Name, Mobile, and Email.");
        
        const booking = { 
            id: "HUB-"+Math.floor(1000+Math.random()*9000), 
            hallId: currentHall.id, 
            hall: currentHall.name, 
            img: currentHall.img, 
            total: total, 
            balance: bal,
            date: selectedDate, 
            customerName: n,
            customerEmail: e,
            status: 'Confirmed', 
            bookedAt: Date.now() 
        };

        myBookings.unshift(booking);
        sendEmail(booking); 
        closeModal(); 
        switchPage('bookings');
    }

    function sendEmail(booking) {
        // Initializing with your Public Key
        emailjs.init("UIIOUwerBpSz1muIQ");

        const templateParams = {
            customer_name: booking.customerName,
            to_email: booking.customerEmail, 
            hall_name: booking.hall,
            booking_id: booking.id,
            date: booking.date,
            paid_now: booking.total.toLocaleString('en-IN'), 
            balance: booking.balance.toLocaleString('en-IN')
        };

        emailjs.send("service_vb12n3j", "template_pws512w", templateParams)
            .then(() => console.log("Email Sent Successfully!"))
            .catch((err) => console.error("Email Error:", err));
    }

    function cancelBooking(id) {
        const b = myBookings.find(x => x.id === id);
        if ((Date.now() - b.bookedAt) / 36e5 > 20) return alert("Cancellation window (20 hrs) closed.");
        const penalty = b.total * 0.05;
        const refund = b.total - penalty - PLATFORM_FEE;
        if(confirm(`Cancel Booking?\n\n5% Penalty: -₹${penalty.toLocaleString()}\nPlatform Fee: -₹${PLATFORM_FEE.toLocaleString()}\nRefund: ₹${Math.max(0, refund).toLocaleString()}`)) {
            b.status = 'Cancelled';
            renderBookings(); update();
        }
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active-page'));
        document.getElementById('page-'+p).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('link-'+p).classList.add('active');
        if(p === 'bookings') renderBookings();
        if(p === 'halls') update();
    }

    function renderBookings() {
        const list = document.getElementById('booking-list');
        list.innerHTML = myBookings.length ? "" : "<p>No active bookings.</p>";
        myBookings.forEach(b => {
            const isC = b.status === 'Cancelled';
            list.innerHTML += `
            <div class="booking-ticket" style="opacity:${isC ? '0.6' : '1'}">
                <div class="ticket-visual"><img src="${b.img}"></div>
                <div class="ticket-content">
                    <span style="font-size:10px; font-weight:800; color:var(--text-muted);">REF: ${b.id} | ${b.date}</span>
                    <h2 style="margin:5px 0; font-weight:800;">${b.hall}</h2>
                    <div style="display:flex; gap:15px; margin-top:5px;">
                        <div><span style="font-size:10px; font-weight:800; color:var(--success);">PAID ONLINE</span><br><b style="font-size:18px;">₹${b.total.toLocaleString()}</b></div>
                        <div><span style="font-size:10px; font-weight:800; color:var(--danger);">PAY AT HALL</span><br><b style="font-size:18px; color:var(--danger);">₹${b.balance.toLocaleString()}</b></div>
                    </div>
                    ${!isC ? `<button onclick="cancelBooking('${b.id}')" style="color:var(--danger); border:2px solid var(--danger); background:none; padding:8px 15px; border-radius:10px; font-weight:700; margin-top:15px; cursor:pointer;">Cancel</button>` : ''}
                    <span style="position:absolute; bottom:25px; right:25px; color:${isC?'var(--danger)':'var(--success)'}; font-weight:800;">● ${b.status}</span>
                </div>
            </div>`;
        });
    }
</script>
</body>
</html>
